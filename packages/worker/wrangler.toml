name = "nimbus-worker"
main = "src/index.ts"
compatibility_date = "2025-01-21"
compatibility_flags = ["nodejs_compat"]

# Enable workers.dev access
workers_dev = true

[vars]
# V2 runtime defaults (can be overridden in D1 runtime_flags)
V2_ENABLED = "false"
V2_CODE_BROWSER_ENABLED = "false"
MAX_ATTEMPTS = "3"
ATTEMPT_TIMEOUT_MS = "600000"
TOTAL_TIMEOUT_MS = "1800000"
IDEMPOTENCY_TTL_HOURS = "24"
MAX_REPAIR_CYCLES = "2"
LINT_BLOCKING = "false"
TEST_BLOCKING = "true"
SAFE_INSTALL_IGNORE_SCRIPTS = "true"
AUTO_INSTALL_SCRIPTS_FALLBACK = "true"
RAW_RETENTION_DAYS = "30"
SUMMARY_RETENTION_DAYS = "180"
WORKSPACE_AGENT_RUNTIME_ENABLED = "false"
WORKSPACE_AGENT_MAX_RETRIES = "2"
WORKSPACE_AGENT_MAX_STEPS = "24"
WORKSPACE_AGENT_TIMEOUT_MS = "900000"
WORKSPACE_AGENT_ALLOW_SCRIPTED_PROVIDER = "false"
WORKSPACE_DEPLOY_ENABLED = "false"
WORKSPACE_DEPLOY_PROVIDER = "simulated"
WORKSPACE_DEPLOY_REAL_PROVIDER_ENABLED = "false"
WORKSPACE_DEPLOY_PREVIEW_DOMAIN = "preview.nimbus.local"
WORKSPACE_DEPLOY_PROJECT_NAME = "nimbus-workspace-preview"
WORKSPACE_DEPLOY_PROVIDER_MAX_POLLS = "120"
WORKSPACE_DEPLOY_PROVIDER_POLL_INTERVAL_MS = "1500"
AGENT_PROVIDER = "cloudflare_agents_sdk"
AGENT_MODEL = "claude-3-7-sonnet"

# D1 Database for job persistence
[[d1_databases]]
binding = "DB"
database_name = "nimbus-db"
database_id = "b0c22993-0a1a-4117-8ffb-f243e7487c05"

[[r2_buckets]]
binding = "SOURCE_BUNDLES"
bucket_name = "nimbus-source-bundles"
preview_bucket_name = "nimbus-source-bundles-preview"

[[queues.producers]]
binding = "CHECKPOINT_JOBS_QUEUE"
queue = "nimbus-checkpoint-jobs"

[[queues.producers]]
binding = "WORKSPACE_TASKS_QUEUE"
queue = "nimbus-workspace-tasks"

[[queues.producers]]
binding = "WORKSPACE_DEPLOYS_QUEUE"
queue = "nimbus-workspace-deploys"

[[queues.consumers]]
queue = "nimbus-checkpoint-jobs"
max_batch_size = 5
max_batch_timeout = 3

[[queues.consumers]]
queue = "nimbus-workspace-tasks"
max_batch_size = 5
max_batch_timeout = 3

[[queues.consumers]]
queue = "nimbus-workspace-deploys"
max_batch_size = 5
max_batch_timeout = 3

# Sandbox container configuration
# Using standard-2 for more memory/disk (needed for framework installs like Astro, Next.js)
[[containers]]
class_name = "Sandbox"
image = "./Dockerfile"
instance_type = "standard-2"

[durable_objects]
bindings = [{ name = "Sandbox", class_name = "Sandbox" }]

[[migrations]]
tag = "v1"
new_sqlite_classes = ["Sandbox"]
